<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totes Ma'Goats | Seattle</title>

<style>
:root {
--cream:#efe6d6;
--cream-light:#f7f1e4;
--green:#274d2f;
--green-dark:#1a2a1a;
--text:#2f3e2f;
--orange:#d3542a;
--white:#ffffff;
--shadow:0 6px 18px rgba(0,0,0,0.08);
}

body {
margin:0;
font-family:Georgia, serif;
background:var(--cream);
color:var(--text);
}

.container {
width:90%;
max-width:1100px;
margin:auto;
}

.section {
padding:60px 0;
}

h2 {
text-align:center;
color:var(--green-dark);
}

.guide-list {
background:var(--cream-light);
border-radius:12px;
padding:20px;
margin-top:20px;
}

.guide-row {
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.booking-wrap {
background:var(--cream-light);
padding:30px;
border-radius:12px;
}

.form-group {
margin-bottom:15px;
}

input, select {
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

.row {
display:flex;
gap:10px;
}

.row > div {
flex:1;
}

button {
background:var(--orange);
color:white;
padding:14px;
border:none;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}

.footer {
background:var(--green);
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<section class="section">
<div class="container">
<h2>How Many Totes Do I Need?</h2>

<div class="guide-list">
<div class="guide-row"><span>Studio</span><span>20 totes</span></div>
<div class="guide-row"><span>1 Bedroom</span><span>30 totes</span></div>
<div class="guide-row"><span>2 Bedroom</span><span>40 totes</span></div>
<div class="guide-row"><span>3 Bedroom</span><span>50 totes</span></div>
<div class="guide-row"><span>Large Homes</span><span>75 totes</span></div>
</div>

</div>
</section>

<section class="section">
<div class="container">

<div class="booking-wrap">

<form id="form">

<h3>Moving From</h3>

<div class="form-group">
<input type="text" placeholder="Street Address" id="fromStreet" required>
</div>

<div class="form-group">
<input type="text" placeholder="Apt / Unit" id="fromUnit">
</div>

<div class="row">
<div>
<select id="fromCity" required>
<option value="">City</option>
<option>Seattle</option>
<option>Bellevue</option>
</select>
</div>

<div>
<input type="text" value="WA" readonly>
</div>

<div>
<input type="text" placeholder="ZIP Code" id="fromZip" required>
</div>
</div>

<h3>Moving To</h3>

<div class="form-group">
<input type="text" placeholder="Street Address" id="toStreet" required>
</div>

<div class="form-group">
<input type="text" placeholder="Apt / Unit" id="toUnit">
</div>

<div class="row">
<div>
<select id="toCity" required>
<option value="">City</option>
<option>Seattle</option>
<option>Bellevue</option>
</select>
</div>

<div>
<input type="text" value="WA" readonly>
</div>

<div>
<input type="text" placeholder="ZIP Code" id="toZip" required>
</div>
</div>

<h3>Move Size</h3>

<select id="size" required>
<option value="">Select</option>
<option>Studio</option>
<option>1 Bedroom</option>
<option>2 Bedroom</option>
<option>3 Bedroom</option>
<option>Large Homes</option>
</select>

<br><br>

<button type="button" id="bookBtn">Continue to Payment</button>

</form>

</div>

</div>
</section>

<div class="footer">Totes Ma'Goats</div>

<script>
const links = {
"Studio":"https://buy.stripe.com/5kQ6oHaU3eO4azSbtC7Re01",
"1 Bedroom":"https://buy.stripe.com/5kQ3cvfajeO4bDWeFO7Re00",
"2 Bedroom":"https://buy.stripe.com/28E6oH5zJ5dugYg55e7Re03",
"3 Bedroom":"https://buy.stripe.com/5kQeVde6f9tK6jCgNW7Re04",
"Large Homes":"https://buy.stripe.com/cNi7sL3rBgWc4bu9lu7Re02"
};

document.getElementById("bookBtn").addEventListener("click", () => {

const fromCity = document.getElementById("fromCity").value;
const toCity = document.getElementById("toCity").value;
const size = document.getElementById("size").value;

if (!fromCity || !toCity) {
alert("Please select valid cities.");
return;
}

if (!size) {
alert("Select move size.");
return;
}

window.location.href = links[size];

});
</script>

</body>
</html>
